# =============================================================================
# SENTRY CONFIGURATION
# =============================================================================
# Sentry DSN for error tracking. When not set, Sentry is disabled (no-op).
# Can also be set via the OPENSCHEDULER_SENTRY_DSN environment variable.
# Default: None
# sentry_dsn: https://examplePublicKey@o0.ingest.sentry.io/0

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging:
  # Logging level for scheduler output
  # Uses tracing EnvFilter format.
  # See https://docs.rs/tracing-subscriber/0.2.19/tracing_subscriber/filter/struct.EnvFilter.html
  # Default: "debug:sqlx=info"
  level: info,sqlx=warn

  # Path to the log file if file_appender is enabled
  # Default: "/opt/rqd/logs/scheduler.log"
  # path: /opt/rqd/logs/scheduler.log

  # Log to file if true, stdout if false
  # Default: false
  # file_appender: false

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
database:
  # Database connection pool size
  # Default: 20
  # pool_size: 20

  # Database host
  # Default: "localhost"
  db_host: localhost

  # Database name
  # Default: "test"
  db_name: cuebot

  # Database user
  # Default: "postgres"
  db_user: cuebot

  # Database password
  # To avoid saving passwords in plain text, override this value using the
  # environment variable OPENSCHEDULER_database.db_pass
  # db_pass: cuebot_password

  # Database port
  # Default: 5432
  db_port: 5432

  # Core multiplier for resource calculations
  # Default: 100
  # core_multiplier: 100

# =============================================================================
# RQD CONFIGURATION
# =============================================================================
rqd:
  # gRPC port for RQD communication
  # Default: 8444
  # grpc_port: 8444

  # If true, runs in dry-run mode without executing actual frame dispatches
  # Default: false
  dry_run_mode: true

# =============================================================================
# QUEUE CONFIGURATION
# =============================================================================
queue:
  # Interval between queue monitoring cycles
  # Default: 5s
  # monitor_interval: 5s

  # Number of worker threads for processing
  # Default: 4
  # worker_threads: 4

  # Maximum number of frames to dispatch per layer per cycle
  # Default: 20
  # dispatch_frames_per_layer_limit: 20

  # Core multiplier for resource calculations
  # Default: 100
  # core_multiplier: 100

  # Memory threshold below which a host is considered stranded
  # Default: 2GiB
  # memory_stranded_threshold: 2GiB

  # Duration to back off a job after dispatch failures
  # Default: 300s (5 minutes)
  # job_back_off_duration: 300s

  # Duration a cluster sleeps after a pass returned no dispatchable jobs.
  # Larger values reduce empty-pass query load on the database.
  # Default: 30s
  # cluster_empty_sleep: 30s

  # Interval between full reloads of the cluster set from the database. The feed
  # re-runs the cluster query each tick so show.b_scheduler_managed flips (and
  # host-tag/subscription changes) are picked up without a restart. The live set
  # is only swapped when it actually changed.
  # Default: 120s
  # cluster_reload_interval: 120s

  # Chunk size for processing manual tags
  # Default: 50
  # manual_tags_chunk_size: 50

  # Chunk size for processing hostname tags
  # Default: 50
  # hostname_tags_chunk_size: 50

  # Maximum number of host candidate attempts per layer
  # Default: 10
  # host_candidate_attemps_per_layer: 10

  # Maximum number of jobs returned per cluster pass. Strict ORDER BY priority
  # DESC means low-priority jobs are deferred to subsequent passes.
  # Default: 20
  # max_jobs_per_cluster_pass: 20

  # Number of empty job cycles before scheduler quits (None = run forever)
  # Default: None
  # empty_job_cycles_before_quiting: 10

  # Minimum memory reserved per host
  # Default: 250MiB
  # mem_reserved_min: 250MiB

  # Interval to recalculate subscription table from proc
  # Default: 3s
  # subscription_recalculation_interval: 3s

  # Interval to recalculate resource tables (layer/job/folder/point) from proc
  # Default: 10s
  # resource_recalculation_interval: 10s

  # List of services that are selfish (require exclusive host access)
  # Default: []
  # selfish_services:
  #   - service1
  #   - service2

  # Stream configuration
  # stream:
  #   # Buffer size for cluster stream processing
  #   # Default: 3
  #   cluster_buffer_size: 3
  #
  #   # Buffer size for job stream processing
  #   # Default: 3
  #   job_buffer_size: 3

  # Host booking strategy configuration
  # host_booking_strategy:
  #   # Enable core saturation booking
  #   # Default: true
  #   core_saturation: true
  #
  #   # Enable memory saturation booking
  #   # Default: false
  #   memory_saturation: false

  # Soft memory limit multiplier for frame memory requirements
  # Used as a threshold to determine if a frame can be dispatched based on available memory
  # Multiplied by the frame's memory requirement to calculate the soft limit
  # Default: 1.6
  # frame_memory_soft_limit: 1.6

  # Hard memory limit multiplier for frame memory requirements
  # Used as a maximum threshold for frame memory allocation
  # Multiplied by the frame's memory requirement to calculate the hard limit
  # Default: 2.0
  # frame_memory_hard_limit: 2.0

# =============================================================================
# HOST CACHE CONFIGURATION
# =============================================================================
host_cache:
  # Number of concurrent host groups to process
  # Default: 3
  # concurrent_groups: 3

  # Memory divisor for grouping hosts by memory size
  # Default: 2GiB
  # memory_key_divisor: 2GiB

  # Timeout for checking out hosts from cache
  # Default: 12s
  # checkout_timeout: 12s

  # Interval for monitoring host cache
  # Default: 1s
  # monitoring_interval: 1s

  # Idle timeout before a group is evicted from cache
  # Default: 10800s (3 hours)
  # group_idle_timeout: 10800s

  # Number of concurrent fetch permits
  # Default: 4
  # concurrent_fetch_permit: 4

  # Enable host stats update.
  # On a production environment, cuebot is responsible for updating the
  # host_stats table.
  # On tests environmnts, not updating the table would lead to invalid
  # memory information. Currently this toggle should only be enabled on
  # test environments (stress_tests.rs)
  # Default: false
  # update_stat_on_book: false

# =============================================================================
# SCHEDULER CONFIGURATION
# =============================================================================
# Which shows the scheduler owns is NOT configured here. It is driven entirely by
# the show.b_scheduler_managed database column (toggle it per show with
# `cueadmin -scheduler-managed <show> on|off`). The scheduler automatically loads
# every cluster (allocation, manual, hostname, and hardware host-tags) for shows
# where b_scheduler_managed = true, and refreshes that set periodically - see
# queue.cluster_reload_interval - so toggling a show takes effect without a
# restart.
scheduler:
  # Optional facility code to run on (can be overridden with --facility flag).
  # Scopes this instance to one facility's scheduler-managed clusters.
  # Default: None
  # facility: eat

  # List of tags to ignore when loading clusters (can be overridden with --ignore_tags flag)
  # These tags will be filtered out from all cluster types (manual, hostname, and alloc)
  # Default: []
  # ignore_tags:
  #   - tag_to_ignore1
  #   - tag_to_ignore2
